  <!-- t -->
  <rect x="1" y="2" width="9" height="3" fill="#fff"/>
  <rect x="4" y="5" width="3" height="9" fill="#fff"/>
  <!-- c -->
  <rect x="11" y="2" width="4" height="1" fill="#fff"/>
  <rect x="11" y="3" width="1" height="1" fill="#fff"/>
  <rect x="14" y="3" width="1" height="1" fill="#fff"/>
  <rect x="11" y="4" width="4" height="1" fill="#fff"/>
  <rect x="9" y="6" width="6" height="2" fill="#fff"/>
  <rect x="9" y="8" width="2" height="4" fill="#fff"/>
  <rect x="9" y="12" width="6" height="2" fill="#fff"/>
</svg>
