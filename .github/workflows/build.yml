name: Build & Deploy

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Full history retained for optional lastmod regeneration tooling;
          # production build consumes frozen src/data/lastmod.json only.
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run eslint

      - name: Typecheck
        run: npm run typecheck

      - name: Astro check
        run: npm run check:astro

      - name: Verify frozen lastmod
        run: npm run lastmod:check

      - name: Build Astro site
        run: npm run build

      - name: Verify routes (full site)
        run: npm run verify:routes

      - name: Verify static assets
        run: npm run verify:assets

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Upload compare fixtures snapshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: astro-dist-manifest
          path: |
            mig/fixtures/routes-jekyll.txt
            mig/fixtures/assets-jekyll.json
            mig/fixtures/legacy-post-urls.txt
          if-no-files-found: ignore

  deploy:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
